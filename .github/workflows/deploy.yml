name: Deploy Lambdas + Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-lambdas:
    name: Deploy Lambda Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      - name: Deploy protecso-cur-chat
        run: |
          cd src/chat
          zip function.zip lambda_function.py
          aws lambda update-function-code \
            --function-name protecso-cur-chat \
            --zip-file fileb://function.zip \
            --region us-east-1

      - name: Deploy protecso-cur-report-email
        run: |
          cd src/report
          zip function.zip lambda_function.py
          aws lambda update-function-code \
            --function-name protecso-cur-report-email \
            --zip-file fileb://function.zip \
            --region us-east-1

      - name: Deploy protecso-cur-athena-action
        run: |
          cd src/athena_action
          zip function.zip lambda_function.py
          aws lambda update-function-code \
            --function-name protecso-cur-athena-action \
            --zip-file fileb://function.zip \
            --region us-east-1

  deploy-frontend:
    name: Deploy Frontend to S3 + CloudFront
    runs-on: ubuntu-latest
    needs: deploy-lambdas
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      - name: Upload index.html to S3
        run: |
          aws s3 cp frontend/index.html s3://${{ secrets.FRONTEND_BUCKET }}/ \
            --content-type "text/html" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
